# 服务端口
server:
  port: 8081

# 应用配置
spring:
  application:
    name: interview-service
  profiles:
    active: local
  config:
    import: optional:nacos:interview-service.yml
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

  # Sentinel 配置
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8858
      eager: true

# 自定义配置
interview:
  welcome: 欢迎使用面试题服务
  cache:
    enabled: true
    ttl: 3600

# 服务信息
info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: 面试题微服务
