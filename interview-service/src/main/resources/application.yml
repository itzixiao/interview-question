# 应用配置
spring:
  profiles:
    active: dev

  # 数据源配置（可从 Nacos 配置中心读取）
  datasource:
    url: jdbc:mysql://localhost:3306/interview?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# Sentinel 配置
spring:
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8858
      eager: true

# 自定义配置
interview:
  welcome: 欢迎使用面试题服务
  cache:
    enabled: true
    ttl: 3600

# 服务信息
info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: 面试题微服务
