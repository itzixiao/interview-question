server:
  port: 8080

spring:
  application:
    name: interview-performance-tuning
  
  # JVM 参数建议（启动时配置）
  # -Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
  
  datasource:
    url: jdbc:mysql://localhost:3306/test?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # HikariCP 连接池优化配置
    hikari:
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 20
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 空闲连接超时（毫秒）
      idle-timeout: 600000
      # 最大生命周期（毫秒）
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1
  
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    
    # 连接池优化配置
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

# Tomcat 线程池优化配置
tomcat:
  threads:
    # 最大工作线程数
    max: 200
    # 最小空闲线程数
    min-spare: 10
  # 最大连接数
  max-connections: 8192
  # 接受队列长度
  accept-count: 100
  # 连接超时时间（毫秒）
  connection-timeout: 20000

# Actuator 性能监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# 日志配置
logging:
  level:
    root: INFO
    cn.itzixiao.interview.performance: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
