server:
  port: 8084

spring:
  application:
    name: interview-transaction-demo
  profiles:
    active: dev
  # Spring Boot 2.6+ 路径匹配策略兼容 Swagger/Knife4j
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/interview?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD}
  # 初始化数据库脚本
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-DD HH:mm:ss
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  # Nacos 配置（可选，本地开发已禁用）
  cloud:
    nacos:
      # 禁用 Nacos 配置检查（本地开发不需要 Nacos）
      config:
        import-check:
          enabled: false
      # 禁用服务注册到 Nacos（本地开发不需要）
      discovery:
        enabled: false
#       server-addr: localhost:8848
#       namespace: public
#       group: DEFAULT_GROUP
  #       config:
  #         server-addr: localhost:8848
  #         namespace: public
  #         group: DEFAULT_GROUP
  #         file-extension: yaml
  #         refresh-enabled: true
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: INFO
    cn.itzixiao.interview.transaction: DEBUG
    org.springframework.transaction: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'

# Knife4j 配置（已集成到配置类中）
