# Seata Server 配置（TC - Transaction Coordinator）

# 存储方式：db/nacos/redis/file
store.mode=db

# 数据库配置
store.db.datasource=druid
store.db.dbType=mysql
store.db.driverClassName=com.mysql.cj.jdbc.Driver
store.db.url=jdbc:mysql://localhost:3306/seata?useUnicode=true&characterEncoding=utf8
store.db.user=root
store.db.password=root
store.db.minConn=5
store.db.maxConn=20
store.db.globalTable=global_table
store.db.branchTable=branch_table
store.db.queryLimit=100
store.db.lockTable=lock_table
store.db.maxWait=5000

# 事务分组
server.servicePort=8091
server.default.grouplist=127.0.0.1:8091
