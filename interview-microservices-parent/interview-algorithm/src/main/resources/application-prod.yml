# 生产环境配置

server:
  port: 8083
  servlet:
    context-path: /algorithm

spring:
  application:
    name: interview-algorithm

  # Nacos 配置
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: prod
        group: DEFAULT_GROUP
      config:
        enabled: false
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yml
        import-check:
          enabled: false

# Actuator 监控端点配置 - 生产环境安全加固
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus  # 只暴露必要端点
  endpoint:
    health:
      show-details: never  # 生产环境不显示详情

# 日志配置
logging:
  level:
    root: WARN
    cn.itzixiao.interview.algorithm: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
