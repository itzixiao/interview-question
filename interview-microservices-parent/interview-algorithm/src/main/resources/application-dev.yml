# 开发环境配置

server:
  port: 8083

spring:
  application:
    name: interview-algorithm

  # Nacos 配置（如需要可启用）
  cloud:
    nacos:
      discovery:
        enabled: false  # 暂时禁用服务注册
        server-addr: localhost:8848
      config:
        enabled: false  # 暂时禁用配置中心
        server-addr: localhost:8848
        file-extension: yml
        import-check:
          enabled: false

# Actuator 监控端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    root: INFO
    cn.itzixiao.interview.algorithm: DEBUG
