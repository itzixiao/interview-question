server:
  port: 8088

spring:
  application:
    name: interview-xxljob

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/interview_db?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    connection-timeout: 15000

# XXL-JOB配置
xxl:
  job:
    admin:
      # 调度中心部署根地址（集群时多个地址逗号分隔）
      addresses: http://127.0.0.1:8080/xxl-job-admin
    executor:
      # 执行器AppName（分组标识，必须唯一）
      appname: interview-xxljob
      # 执行器IP（为空时自动获取）
      ip:
      # 执行器端口（为空时自动分配，建议指定）
      port: 9999
      # 执行器日志路径
      logpath: /data/applogs/xxl-job/jobhandler
      # 执行器日志保留天数
      logretentiondays: 30
    # 调度中心通讯TOKEN（非空时启用）
    accessToken: default_token

# 日志配置
logging:
  level:
    root: info
    cn.itzixiao.interview.xxljob: debug
    com.xxl.job: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
