server:
  port: 8090

spring:
  application:
    name: interview-spring-ai
  
  # Spring AI 配置
  ai:
    # OpenAI 配置
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-ada-002
    
    # 向量存储配置
    vectorstore:
      simple:
        embedding-dimension: 1536

# Knife4j API 文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    cn.itzixiao.interview.springai: DEBUG
    org.springframework.ai: DEBUG
