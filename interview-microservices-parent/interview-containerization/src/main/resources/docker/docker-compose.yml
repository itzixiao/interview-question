# ========================
# Docker Compose 多容器编排示例
# ========================
# 用途：演示微服务容器编排
# 作者：itzixiao
# 时间：2026-03-15

version: '3.8'

# 定义网络
networks:
  app-network:
    driver: bridge

# 定义数据卷
volumes:
  mysql-data:
  redis-data:

# 定义服务
services:
  # ===========================================
  # 1. MySQL 数据库服务
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: interview-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: interview_db
      MYSQL_USER: interview
      MYSQL_PASSWORD: interview123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  # ===========================================
  # 2. Redis 缓存服务
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: interview-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server /usr/local/etc/redis/redis.conf

  # ===========================================
  # 3. 主应用服务（容器化示例应用）
  # ===========================================
  app:
    build:
      context: .
      dockerfile: src/main/resources/docker/Dockerfile
    image: interview-containerization:1.0.0
    container_name: interview-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: interview_db
      DB_USERNAME: interview
      DB_PASSWORD: interview123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "8080:8080"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start-period: 60s
      retries: 3
    volumes:
      - ./logs:/app/logs

  # ===========================================
  # 4. Nginx 反向代理服务
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: interview-nginx
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/logs:/var/log/nginx
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # 5. Prometheus 监控服务（可选）
  # ===========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: interview-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - app-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  # ===========================================
  # 6. Grafana 可视化面板（可选）
  # ===========================================
  grafana:
    image: grafana/grafana:latest
    container_name: interview-grafana
    restart: always
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - app-network

# ===========================================
# 使用说明
# ===========================================
# 1. 启动所有服务：docker-compose up -d
# 2. 查看日志：docker-compose logs -f
# 3. 查看特定服务日志：docker-compose logs -f app
# 4. 停止所有服务：docker-compose down
# 5. 停止并删除数据卷：docker-compose down -v
# 6. 重启服务：docker-compose restart
# 7. 重新构建：docker-compose up -d --build
# 8. 查看服务状态：docker-compose ps
# 9. 进入容器：docker-compose exec app sh
# 10. 扩缩容：docker-compose up -d --scale app=3

# ===========================================
# 访问地址汇总
# ===========================================
# - 应用接口：http://localhost:8080
# - Nginx 代理：http://localhost
# - Prometheus: http://localhost:9090
# - Grafana: http://localhost:3000 (密码：admin123)
# - MySQL: localhost:3306
# - Redis: localhost:6379
