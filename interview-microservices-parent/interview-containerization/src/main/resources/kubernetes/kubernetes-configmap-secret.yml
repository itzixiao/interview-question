# ========================
# Kubernetes 配置示例 - ConfigMap & Secret
# ========================
# 用途：演示配置管理和敏感信息管理
# 作者：itzixiao
# 时间：2026-03-15

# ===========================================
# 1. ConfigMap - 应用配置文件
# ===========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: interview-config
  labels:
    app: interview-app
data:
  # 方式 1：字面值配置
  APP_NAME: "interview-containerization"
  APP_ENV: "kubernetes"
  LOG_LEVEL: "INFO"
  
  # 方式 2：Properties 格式
  application.properties: |
    server.port=8080
    spring.profiles.active=kubernetes
    management.endpoints.web.exposure.include=health,info,metrics
    management.endpoint.health.show-details=always
  
  # 方式 3：YAML 格式
  application.yml: |
    server:
      port: 8080
    spring:
      profiles:
        active: kubernetes
      datasource:
        url: jdbc:mysql://mysql-service:3306/interview_db?useSSL=false&serverTimezone=UTC
        driver-class-name: com.mysql.cj.jdbc.Driver
    redis:
      host: redis-service
      port: 6379

---
# ===========================================
# 2. Secret - 敏感信息（Base64 编码）
# ===========================================
apiVersion: v1
kind: Secret
metadata:
  name: interview-secret
  labels:
    app: interview-app
type: Opaque
stringData:
  # 方式 1：明文写法（K8s 会自动 Base64 编码）
  DB_USERNAME: "interview"
  DB_PASSWORD: "interview123"
  JWT_SECRET: "my-super-secret-jwt-key-2026"
  API_KEY: "sk-xxxxxxxxxxxxxx"

# 方式 2：Base64 编码（需要先手动编码）
# echo -n "interview" | base64
# data:
#   DB_USERNAME: aW50ZXJ2aWV3
#   DB_PASSWORD: aW50ZXJ2aWV3MTIz

---
# ===========================================
# 3. Secret - Docker Registry 认证
# ===========================================
apiVersion: v1
kind: Secret
metadata:
  name: registry-secret
  labels:
    app: interview-app
type: kubernetes.io/dockerconfigjson
data:
  # .dockerconfigjson 内容：{"auths":{"registry.example.com":{"username":"user","password":"pass","email":"user@example.com","auth":"base64"}}}
  .dockerconfigjson: eyJhdXRocyI6eyJyZWdpc3RyeS5leGFtcGxlLmNvbSI6eyJ1c2VybmFtZSI6InVzZXIiLCJwYXNzd29yZCI6InBhc3MiLCJlbWFpbCI6InVzZXJAZXhhbXBsZS5jb20iLCJhdXRoIjoiZFhObGNqcHdZWE56In19fQ==

---
# ===========================================
# 4. 在 Deployment 中使用 ConfigMap 和 Secret
# ===========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-app-with-config
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interview-app
  template:
    metadata:
      labels:
        app: interview-app
    spec:
      containers:
        - name: interview-app
          image: interview-containerization:1.0.0

          # 方式 1：作为环境变量
          envFrom:
            - configMapRef:
                name: interview-config
            - secretRef:
                name: interview-secret

          # 方式 2：单个键值对
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: interview-secret
                  key: DB_USERNAME
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: interview-config
                  key: APP_NAME

          # 方式 3：挂载为文件
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
            - name: secret-volume
              mountPath: /app/secrets
              readOnly: true
      
      volumes:
        - name: config-volume
          configMap:
            name: interview-config
            items:
              - key: application.yml
                path: application.yml
        - name: secret-volume
          secret:
            secretName: interview-secret

---
# ===========================================
# ConfigMap & Secret 操作命令
# ===========================================
# 创建 ConfigMap: kubectl apply -f kubernetes-configmap-secret.yml
# 查看所有 ConfigMap: kubectl get configmaps
# 查看 ConfigMap 详情：kubectl describe configmap interview-config
# 查看 ConfigMap 内容：kubectl get configmap interview-config -o yaml
# 编辑 ConfigMap: kubectl edit configmap interview-config
# 删除 ConfigMap: kubectl delete configmap interview-config

# 创建 Secret: kubectl apply -f kubernetes-configmap-secret.yml
# 查看所有 Secrets: kubectl get secrets
# 查看 Secret 详情：kubectl describe secret interview-secret
# 查看 Secret 内容：kubectl get secret interview-secret -o yaml
# 删除 Secret: kubectl delete secret interview-secret

# 从字面值创建 ConfigMap:
# kubectl create configmap interview-config --from-literal=APP_NAME=myapp --from-literal=APP_ENV=prod

# 从文件创建 ConfigMap:
# kubectl create configmap interview-config --from-file=application.properties=./application.properties

# 从字面值创建 Secret:
# kubectl create secret generic interview-secret --from-literal=DB_USERNAME=interview --from-literal=DB_PASSWORD=interview123

# 从文件创建 Secret:
# kubectl create secret generic interview-secret --from-file=.env=./.env
