# Istio VirtualService 配置 - 流量路由规则

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: product-page-virtual-service
  namespace: default
spec:
  hosts:
    - productpage.default.svc.cluster.local
  
  gateways:
    - productpage-gateway
  
  http:
    # 金丝雀发布：90% 流量到 v1，10% 流量到 v2
    - match:
        - headers:
            end-user:
              exact: "test-user"  # 测试用户走新版本
      route:
        - destination:
            host: productpage
            subset: v2
    
    # 默认路由 - 90% 流量到稳定版本
    - route:
        - destination:
            host: productpage
            subset: v1
          weight: 90
        - destination:
            host: productpage
            subset: v2
          weight: 10

---
# 蓝绿部署配置
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: blue-green-deployment
  namespace: default
spec:
  hosts:
    - myapp.default.svc.cluster.local
  
  http:
    # 通过 header 控制蓝绿切换
    - match:
        - headers:
            version:
              exact: "green"
      route:
        - destination:
            host: myapp
            subset: green
    
    # 默认走蓝色版本
    - route:
        - destination:
            host: myapp
            subset: blue
