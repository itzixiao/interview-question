# Logstash 管道配置示例
# 文件名：logstash-pipeline.conf
# 用途：处理 Filebeat 采集的日志数据并输出到 Elasticsearch

input {
  beats {
    port => 5044
    host => "0.0.0.0"
    
    # SSL 配置（生产环境建议开启）
    #ssl => true
    #ssl_certificate => "/etc/logstash/certs/logstash.crt"
    #ssl_key => "/etc/logstash/certs/logstash.key"
  }
}

filter {
  # 解析 JSON 格式的日志
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "json_data"
    }
  }
  
  # 添加时间戳格式化
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
    timezone => "Asia/Shanghai"
  }
  
  # 根据服务名称添加标签
  if [fields][service] == "interview-observability" {
    mutate {
      add_tag => ["interview_app"]
    }
  }
  
  # 提取日志级别
  if [json_data][level] {
    mutate {
      lowercase => ["[json_data][level]"]
    }
    
    # 根据日志级别分类
    if [json_data][level] in ["error", "fatal"] {
      mutate {
        add_tag => ["error_log"]
      }
    } else if [json_data][level] == "warn" {
      mutate {
        add_tag => ["warn_log"]
      }
    }
  }
  
  # 删除不必要的字段
  mutate {
    remove_field => ["agent", "ecs", "host", "input", "beat"]
  }
  
  # 添加处理标记
  mutate {
    add_field => {"processed_by" => "logstash"}
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    
    # 索引命名：interview-logs-2026.03.15
    index => "interview-logs-%{+YYYY.MM.dd}"
    
    # 类型（ES 7.x 后不再需要）
    #document_type => "_doc"
    
    # 批量配置
    bulk_actions => 1000
    flush_interval => 5
  }
  
  # 调试时可输出到标准输出
  stdout {
    codec => rubydebug
  }
}
