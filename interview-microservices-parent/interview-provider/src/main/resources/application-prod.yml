# 生产环境配置

# 服务端口（与 interview-service 8081 区分）
server:
  port: 8082
  servlet:
    context-path: /provider

# Spring Cloud Nacos 配置
spring:
  # ShardingSphere 分库分表演示功能（已禁用）
  # ShardingSphere 5.4.1 与 Spring Boot 3.2.x / JDK 17 存在多个不兼容问题：
  #   1. factoryBeanObjectType 类型冲突（mybatis-spring 3.0.3 问题）
  #   2. JAXB-API 在 JDK 17 中已移除
  # 设置 enabled=false 禁用 ShardingDataSourceConfig，DataSource 由 MyBatis-Plus 自动配置提供
  shardingsphere:
    enabled: false
    props:
      sql-show: false
    datasource:
      ds0:
        jdbc-url: ${MYSQL_URL:jdbc:mysql://localhost:3306/interview?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
        username: ${MYSQL_USERNAME:root}
        password: ${MYSQL_PASSWORD:}

  # 普通 DataSource 配置（供 MyBatis-Plus 使用）
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/interview?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10             # 生产环境调大最小空闲连接
      maximum-pool-size: 50        # 生产环境调大最大连接数
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: prod
        group: DEFAULT_GROUP
      config:
        enabled: false
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yml
        namespace: prod
        group: DEFAULT_GROUP
        import-check:
          enabled: false

  # Elasticsearch 配置
  elasticsearch:
    uris: ${ES_URIS:http://localhost:19200}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD:}

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:10}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

# Spring Boot Actuator 配置 - 生产环境安全加固
management:
  # 端点暴露配置 - 最小化原则
  endpoints:
    web:
      exposure:
        include: health,info,prometheus  # 只暴露必要端点
  # 健康检查端点配置
  endpoint:
    health:
      show-details: never  # 生产环境不显示详情
      probes:
        enabled: true  # 启用 K8s 探针支持
    datasource:
      enabled: false  # 禁用 DataSource 健康检查（ShardingSphere 不支持 isValid 方法）
  # 信息端点配置
  info:
    env:
      enabled: false  # 生产环境禁用环境信息显示
  # 性能指标配置
  metrics:
    export:
      simple:
        enabled: false  # 生产环境禁用简单指标导出
      prometheus:
        enabled: true  # 启用 Prometheus 指标导出
  # Web 服务器指标配置
  server:
    tomcat:
      mbeanregistry:
        enabled: true

# 自定义线程池配置（演示 Starter 使用）
custom:
  thread-pool:
    enabled: true                    # 是否启用（默认 true）
    core-pool-size: 20               # 核心线程数（生产环境调大）
    max-pool-size: 50                # 最大线程数
    queue-capacity: 500              # 队列容量
    keep-alive-time: 300             # 空闲线程存活时间（秒）
    name-prefix: "provider-pool"     # 线程名前缀
    rejected-policy: "CALLER_RUNS"   # 拒绝策略：ABORT/CALLER_RUNS/DISCARD/DISCARD_OLDEST

# 应用信息（会在/actuator/info 中显示）
info:
  app:
    name: interview-provider
    version: 1.0.0-SNAPSHOT
    description: 服务提供者 - OpenFeign 微服务调用演示
    environment: production

# JWT 配置 - 生产环境
# 优先级：1.环境变量 JWT_SECRET_KEY  2.Nacos common.yml 下发的 jwt.secret-key
# 必须与 Gateway 服务保持一致
jwt:
  secret-key: ${JWT_SECRET_KEY:${jwt.secret-key:}}
  expiration: ${jwt.expiration:7200}
  issuer: ${jwt.issuer:interview-provider}
