# 生产环境配置

# 服务端口（与 interview-service 8081 区分）
server:
  port: 8082

# Spring Cloud Nacos 配置
spring:
  # ShardingSphere 分库分表配置（4.1.1 版本）
  shardingsphere:
    # 开启 SQL 显示（生产环境建议关闭）
    props:
      sql:
        show: false
    
    # 数据源配置
    datasource:
      names: ds0
      ds0:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://localhost:3306/interview?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: root
        password: ${MYSQL_PASSWORD:}
        hikari:
          minimum-idle: 10             # 生产环境调大最小空闲连接
          maximum-pool-size: 50        # 生产环境调大最大连接数
          connection-timeout: 30000
          idle-timeout: 600000
          max-lifetime: 1800000
    
    # 分库分表规则
    sharding:
      # 默认数据库策略（不分片）
      default-database-strategy:
        none:
      
      # 表分片规则
      tables:
        device_operation_log:
          # 实际数据节点：ds0.device_operation_log_202601 ~ ds0.device_operation_log_202612
          actual-data-nodes: ds0.device_operation_log_202601,ds0.device_operation_log_202602,ds0.device_operation_log_202603,ds0.device_operation_log_202604,ds0.device_operation_log_202605,ds0.device_operation_log_202606,ds0.device_operation_log_202607,ds0.device_operation_log_202608,ds0.device_operation_log_202609,ds0.device_operation_log_202610,ds0.device_operation_log_202611,ds0.device_operation_log_202612
          # 表分片策略
          table-strategy:
            standard:
              # 分片列（必须是数据库字段名）
              sharding-column: operation_time
              # 精确分片算法
              precise-algorithm-class-name: cn.itzixiao.interview.provider.config.sharding.DeviceOperationLogMonthShardingAlgorithm
              # 范围分片算法
              range-algorithm-class-name: cn.itzixiao.interview.provider.config.sharding.DeviceOperationLogMonthShardingAlgorithm

  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: localhost:8848
      config:
        enabled: false
        server-addr: localhost:8848
        file-extension: yml
        namespace: prod
        group: DEFAULT_GROUP
        import-check:
          enabled: false

# Spring Boot Actuator 配置 - 生产环境安全加固
management:
  # 端点暴露配置 - 最小化原则
  endpoints:
    web:
      exposure:
        include: health,info,prometheus  # 只暴露必要端点
  # 健康检查端点配置
  endpoint:
    health:
      show-details: never  # 生产环境不显示详情
      probes:
        enabled: true  # 启用 K8s 探针支持
    datasource:
      enabled: false  # 禁用 DataSource 健康检查（ShardingSphere 不支持 isValid 方法）
  # 信息端点配置
  info:
    env:
      enabled: false  # 生产环境禁用环境信息显示
  # 性能指标配置
  metrics:
    export:
      simple:
        enabled: false  # 生产环境禁用简单指标导出
      prometheus:
        enabled: true  # 启用 Prometheus 指标导出
  # Web 服务器指标配置
  server:
    tomcat:
      mbeanregistry:
        enabled: true

# 自定义线程池配置（演示 Starter 使用）
custom:
  thread-pool:
    enabled: true                    # 是否启用（默认 true）
    core-pool-size: 20               # 核心线程数（生产环境调大）
    max-pool-size: 50                # 最大线程数
    queue-capacity: 500              # 队列容量
    keep-alive-time: 300             # 空闲线程存活时间（秒）
    name-prefix: "provider-pool"     # 线程名前缀
    rejected-policy: "CALLER_RUNS"   # 拒绝策略：ABORT/CALLER_RUNS/DISCARD/DISCARD_OLDEST

# 应用信息（会在/actuator/info 中显示）
info:
  app:
    name: interview-provider
    version: 1.0.0-SNAPSHOT
    description: 服务提供者 - OpenFeign 微服务调用演示
    environment: production

# JWT 配置 - 生产环境应使用环境变量或配置中心
jwt:
  secret-key: "${JWT_SECRET_KEY:interview-production-secure-secret-key-change-in-real-env}"  # 从环境变量读取，或使用默认值
  expiration: 7200  # token 过期时间（秒），生产环境建议 2 小时
  issuer: "interview-provider"
