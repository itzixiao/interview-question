# 开发环境配置

# 服务端口（与 interview-service 8081 区分）
server:
  port: 8082
  servlet:
    context-path: /provider

# Spring Cloud Nacos 配置
spring:
  # ShardingSphere 分库分表演示功能（已禁用）
  # ShardingSphere 5.4.1 与 Spring Boot 3.2.x / JDK 17 存在多个不兼容问题：
  #   1. factoryBeanObjectType 类型冲突（mybatis-spring 3.0.3 问题）
  #   2. JAXB-API 在 JDK 17 中已移除
  # 设置 enabled=false 禁用 ShardingDataSourceConfig，DataSource 由 MyBatis-Plus 自动配置提供
  shardingsphere:
    enabled: false
    props:
      sql-show: true
    datasource:
      ds0:
        jdbc-url: jdbc:mysql://localhost:3306/interview?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: root
        password: ${MYSQL_PASSWORD:}

  # 普通 DataSource 配置（供 MyBatis-Plus 使用）
  datasource:
    url: jdbc:mysql://localhost:3306/interview?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: localhost:8848
        group: DEFAULT_GROUP
      config:
        enabled: false
        server-addr: localhost:8848
        file-extension: yml
        namespace: dev
        group: DEFAULT_GROUP
        import-check:
          enabled: false

  # Elasticsearch 配置
  elasticsearch:
    uris: http://localhost:19200
    username: elastic
    password: ${ES_PASSWORD:}

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}  # 如果有密码请设置环境变量
      database: 10
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# Spring Boot Actuator 配置
management:
  # 健康检查配置
  health:
    db:
      enabled: false  # 禁用数据库健康检查（ShardingSphere 不支持 isValid 方法）
    datasource:
      enabled: false  # 禁用 DataSource 健康检查（双重保险）
  # 端点暴露配置
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,threaddump,httpexchanges,prometheus,gc,heapdump
  # 健康检查端点配置
  endpoint:
    gc:
      enabled: true  # 开启 GC 监控
    env:
      # 全局关闭脱敏（所有配置都显示明文）
      sanitize: false
    health:
      show-details: always  # 始终显示健康详情
      probes:
        enabled: true  # 启用 K8s 探针支持
  # 信息端点配置
  info:
    env:
      enabled: true  # 启用环境信息显示
  # 性能指标配置
  metrics:
    export:
      simple:
        enabled: true  # 启用简单指标导出
      prometheus:
        enabled: true  # 启用 Prometheus 指标导出
  # Web 服务器指标配置
  server:
    tomcat:
      mbeanregistry:
        enabled: true  # 启用 MBean 注册（用于监控 Tomcat）

# 自定义线程池配置（演示 Starter 使用）
custom:
  thread-pool:
    enabled: true                    # 是否启用（默认 true）
    core-pool-size: 10               # 核心线程数
    max-pool-size: 20                # 最大线程数
    queue-capacity: 200              # 队列容量
    keep-alive-time: 120             # 空闲线程存活时间（秒）
    name-prefix: "provider-pool"     # 线程名前缀
    rejected-policy: "CALLER_RUNS"   # 拒绝策略：ABORT/CALLER_RUNS/DISCARD/DISCARD_OLDEST

# 应用信息（会在/actuator/info 中显示）
info:
  app:
    name: interview-provider
    version: 1.0.0-SNAPSHOT
    description: 服务提供者 - OpenFeign 微服务调用演示
    environment: development

# JWT 配置
# 开发环境本地默认值（Nacos 可用时会被 common.yml 中的 jwt.* 覆盖）
jwt:
  secret-key: itzixiao-interview-system-secret-key-2026-this-is-a-demo-for-learning
  expiration: 86400
  issuer: interview-provider
