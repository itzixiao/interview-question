# 开发环境配置

# 服务端口（与 interview-service 8081 区分）
server:
  port: 8082

# Spring Cloud Nacos 配置
spring:
  datasource:
    # MySQL 数据源配置（设备日志导出测试用）
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/interview?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:}
    # HikariCP 连接池配置（可根据实际情况调整）
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: localhost:8848
      config:
        enabled: false
        server-addr: localhost:8848
        file-extension: yml
        namespace: dev
        group: DEFAULT_GROUP
        import-check:
          enabled: false

# Spring Boot Actuator 配置
management:
  # 端点暴露配置
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,threaddump,httpexchanges,prometheus
  # 健康检查端点配置
  endpoint:
    env:
      # 全局关闭脱敏（所有配置都显示明文）
      sanitize: false
    health:
      show-details: always  # 始终显示健康详情
      probes:
        enabled: true  # 启用 K8s 探针支持
  # 信息端点配置
  info:
    env:
      enabled: true  # 启用环境信息显示
  # 性能指标配置
  metrics:
    export:
      simple:
        enabled: true  # 启用简单指标导出
      prometheus:
        enabled: true  # 启用 Prometheus 指标导出
  # Web 服务器指标配置
  server:
    tomcat:
      mbeanregistry:
        enabled: true  # 启用 MBean 注册（用于监控 Tomcat）

# 自定义线程池配置（演示 Starter 使用）
custom:
  thread-pool:
    enabled: true                    # 是否启用（默认 true）
    core-pool-size: 10               # 核心线程数
    max-pool-size: 20                # 最大线程数
    queue-capacity: 200              # 队列容量
    keep-alive-time: 120             # 空闲线程存活时间（秒）
    name-prefix: "provider-pool"     # 线程名前缀
    rejected-policy: "CALLER_RUNS"   # 拒绝策略：ABORT/CALLER_RUNS/DISCARD/DISCARD_OLDEST

# 应用信息（会在/actuator/info 中显示）
info:
  app:
    name: interview-provider
    version: 1.0.0-SNAPSHOT
    description: 服务提供者 - OpenFeign 微服务调用演示
    environment: development

# JWT 配置
jwt:
  secret-key: "itzixiao-interview-system-secret-key-2026-this-is-a-demo-for-learning"  # JWT 密钥（生产环境应使用环境变量）
  expiration: 86400  # token 过期时间（秒），默认 24 小时
  issuer: "interview-provider"  # token 签发者
