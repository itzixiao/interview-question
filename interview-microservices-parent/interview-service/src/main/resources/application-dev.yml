# 开发环境配置（使用 Nacos）

# 服务端口
server:
  port: 8081
  servlet:
    context-path: /service

# Nacos 配置
spring:
  config:
    import: optional:nacos:interview-service.yml
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml
        namespace: dev
        group: DEFAULT_GROUP
    sentinel:
      transport:
        dashboard: localhost:8858
      eager: true

  # 数据源配置（可从 Nacos 配置中心读取，也可本地覆盖）
  datasource:
    url: jdbc:mysql://localhost:3306/interview?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  # MongoDB 配置
  data:
    mongodb:
      uri: mongodb://root:${MONGO_PASSWORD:root}@localhost:27017/interview_db?authSource=admin
      database: interview_db

# MongoDB 功能开关
mongodb:
  enabled: true
