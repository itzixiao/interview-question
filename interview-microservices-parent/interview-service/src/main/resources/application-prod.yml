# 生产环境配置

# 服务端口
server:
  port: 8080

# Nacos 生产环境配置
spring:
  config:
    import: optional:nacos:interview-service-prod.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos.example.com:8848}
        namespace: prod
        group: PROD_GROUP
      config:
        server-addr: ${NACOS_SERVER_ADDR:nacos.example.com:8848}
        namespace: prod
        group: PROD_GROUP
        file-extension: yml
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
      eager: true

# 生产环境数据源（建议从 Nacos 配置中心读取）
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/interview?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

# 生产环境 Redis
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

# 日志级别
logging:
  level:
    root: WARN
    cn.itzixiao: INFO
