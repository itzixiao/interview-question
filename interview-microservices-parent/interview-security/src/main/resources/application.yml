security:
  jwt:
    # JWT 密钥（生产环境应该使用环境变量或配置中心）
    secret: mySecretKeyForJWTGenerationMustBeLongEnoughAndSecure123456
    # Access Token 过期时间（秒）- 默认 1 小时
    expiration: 3600
    # Refresh Token 过期时间（秒）- 默认 7 天
    refresh-expiration: 604800

# OAuth2.0 授权服务器配置（示例）
oauth2:
  authorization:
    # 授权码模式 - 授权端点
    authorization-uri: /oauth/authorize
    # 令牌端点
    token-uri: /oauth/token
    # 用户信息端点
    user-info-uri: /api/user/me
    # 客户端 ID
    client-id: interview-client
    # 客户端密钥
    client-secret: client-secret-123
    # 重定向 URI
    redirect-uri: http://localhost:8080/login/oauth2/code/custom
