spring:
  application:
    name: interview-gateway
  profiles:
    active: dev

# 白名单配置（无需鉴权的路径）
# 支持前缀匹配： /api/interview/**  → /api/interview/ 开头的所有路径
# 支持包含匹配： /login             → 路径中包含 /login 的请求
gateway:
  white-list:
    paths:
      - /login
      - /register
      - /api/provider/api/auth/login   # JWT 登录接口
      - /api/provider/api/auth/verify  # JWT 验证接口
      - /api/service/**                 # 面试题服务所有接口
      - /api/algorithm/**               # 算法服务所有接口
      - /api/kafka/**                   # Kafka 服务所有接口
      - /api/rabbitmq/**                # RabbitMQ 服务所有接口
      - /api/transaction/**             # 事务演示服务所有接口
      - /api/workflow/**                # 工作流服务所有接口
      - /api/xxljob/**                  # XXL-JOB 服务所有接口
      - /api/performance/**             # 性能调优服务所有接口
      - /api/observability/**           # 可观测性服务所有接口

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
