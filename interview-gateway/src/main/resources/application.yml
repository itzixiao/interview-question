spring:
  application:
    name: interview-gateway
  profiles:
    active: dev

# 白名单配置（无需鉴权的路径）
# 支持前缀匹配： /api/interview/**  → /api/interview/ 开头的所有路径
# 支持包含匹配： /login             → 路径中包含 /login 的请求
gateway:
  white-list:
    paths:
      - /login
      - /register
      - /api/interview/**

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
