server:
  port: 8080

spring:
  config:
    import: optional:nacos:interview-gateway.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: prod
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: prod
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            group: DEFAULT_GROUP
            refresh: true
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        eager: true

    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # 路由配置
      routes:
        # 面试题服务
        - id: interview-service
          uri: lb://interview-service
          predicates:
            - Path=/api/interview/**
          filters:
            - StripPrefix=1
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY

        # 用户服务（示例）
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

      # 全局默认过滤器
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - AddResponseHeader=X-Response-From, Gateway

      # 跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

# JWT 配置
# 生产环境优先级：1.环境变量 JWT_SECRET_KEY  2.Nacos common.yml 下发的 jwt.secret-key
# 两种方式任意一种即可，必须与 Provider 服务保持一致
jwt:
  secret-key: ${JWT_SECRET_KEY:${jwt.secret-key:}}
  issuer: ${jwt.issuer:interview-provider}
  expiration: ${jwt.expiration:7200}
