server:
  port: 8080

spring:
  config:
    import: optional:nacos:interview-gateway.yml
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        namespace: dev
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            group: DEFAULT_GROUP
            refresh: true
    sentinel:
      transport:
        dashboard: localhost:8858
        eager: true

    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # 路由配置
      # 各服务已配置 context-path，Gateway 只需转发到服务即可
      # 例如：/api/provider/xxx → provider服务的 /provider/xxx
      routes:
        # 服务提供者（interview-provider）
        # 访问 /api/provider/xxx → 转发到 provider 服务的 /provider/xxx
        - id: interview-provider
          uri: lb://interview-provider
          predicates:
            - Path=/api/provider/**
          filters:
            - StripPrefix=1
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY

        # 面试题服务（通过注册中心负载均衡）
        - id: interview-service
          uri: lb://interview-service
          predicates:
            - Path=/api/service/**
          filters:
            - StripPrefix=1
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY

        # 算法服务
        - id: interview-algorithm
          uri: lb://interview-algorithm
          predicates:
            - Path=/api/algorithm/**
          filters:
            - StripPrefix=1

        # Kafka 服务
        - id: interview-kafka
          uri: lb://interview-kafka
          predicates:
            - Path=/api/kafka/**
          filters:
            - StripPrefix=1

        # RabbitMQ 服务
        - id: interview-rabbitmq
          uri: lb://interview-rabbitmq
          predicates:
            - Path=/api/rabbitmq/**
          filters:
            - StripPrefix=1

        # 事务演示服务
        - id: interview-transaction-demo
          uri: lb://interview-transaction-demo
          predicates:
            - Path=/api/transaction/**
          filters:
            - StripPrefix=1

        # 工作流服务
        - id: interview-workflow
          uri: lb://interview-workflow
          predicates:
            - Path=/api/workflow/**
          filters:
            - StripPrefix=1

        # XXL-JOB 服务
        - id: interview-xxljob
          uri: lb://interview-xxljob
          predicates:
            - Path=/api/xxljob/**
          filters:
            - StripPrefix=1

        # 性能调优服务
        - id: interview-performance-tuning
          uri: lb://interview-performance-tuning
          predicates:
            - Path=/api/performance/**
          filters:
            - StripPrefix=1

        # 可观测性服务
        - id: interview-observability
          uri: lb://interview-observability
          predicates:
            - Path=/api/observability/**
          filters:
            - StripPrefix=1

      # 全局默认过滤器
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - AddResponseHeader=X-Response-From, Gateway

      # 跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

# JWT 配置
# 密鑐统一由 Nacos common.yml 下发，此处使用 ${jwt.*} 引用
# 开发环境本地无 Nacos 时回退到默认值（仅供本地调试）
jwt:
  secret-key: ${jwt.secret-key:itzixiao-interview-system-secret-key-2026-this-is-a-demo-for-learning}
  issuer: ${jwt.issuer:interview-provider}
  expiration: ${jwt.expiration:7200}
